services:
  backend:
    build: ./backend
    environment:
      DB_PATH: /data/fakturant.db
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN:-*}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-onboarding@resend.dev}
      APP_URL: ${APP_URL:-http://localhost}
    volumes:
      - invoice_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512m

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 64m

volumes:
  invoice_data:
