<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fakturant — E-mail potvrzen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f5f4f2;--paper2:#eceae5;--paper3:#d8d3ca;
  --ink:#1a1a18;--ink2:#3d3c38;--ink3:#7a7870;--ink4:#b0ada6;
  --blue:#2563eb;--sans:'DM Sans',system-ui,sans-serif;
  --green:#166534;--greenbg:rgba(22,101,52,.07);--greenb:rgba(22,101,52,.25);
  --r:6px;--r2:8px;--r3:12px;
  --sh-lg:0 10px 40px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
body{font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r3);box-shadow:var(--sh-lg);padding:40px 36px;width:100%;max-width:360px;text-align:center}
.logo{display:inline-flex;align-items:baseline;gap:1px;font-family:'Fraunces',serif;font-style:italic;font-size:22px;letter-spacing:-.3px;margin-bottom:28px;color:var(--ink);text-decoration:none}
.logo-f{font-size:26px;font-weight:400}
.logo-rest{font-weight:300;color:var(--ink2)}
.check{width:56px;height:56px;background:var(--greenbg);border:2px solid var(--greenb);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;color:var(--green)}
h2{font-size:16px;font-weight:600;margin-bottom:10px;color:var(--green)}
.desc{font-size:13px;color:var(--ink3);line-height:1.6;margin-bottom:28px}
a.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 24px;background:var(--blue);color:#fff;text-decoration:none;border-radius:var(--r2);font-weight:500;font-size:14px;transition:opacity .15s}
a.btn:hover{opacity:.88}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/"><span class="logo-f">F</span><span class="logo-rest">akturant</span></a>

  <div class="check">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>

  <h2>E-mail byl potvrzen!</h2>
  <p class="desc">Váš účet je aktivní. Nyní se můžete přihlásit a začít fakturovat.</p>

  <a href="/login" class="btn">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
    Přihlásit se
  </a>
</div>
</body>
</html>
