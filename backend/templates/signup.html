<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Fakturant — Registrace</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=Fraunces:ital,opsz,wght@1,9..144,400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --paper:#f5f4f2;--paper2:#eceae5;--paper3:#d8d3ca;
  --ink:#1a1a18;--ink2:#3d3c38;--ink3:#7a7870;--ink4:#b0ada6;
  --blue:#2563eb;--blueb:rgba(37,99,235,.25);--bluebg:rgba(37,99,235,.06);
  --red:#dc2626;--redbg:rgba(220,38,38,.07);--redb:rgba(220,38,38,.25);
  --sans:'DM Sans',system-ui,sans-serif;
  --r:6px;--r2:8px;--r3:12px;
  --sh-lg:0 10px 40px rgba(0,0,0,.10),0 2px 8px rgba(0,0,0,.06);
}
body{font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border:1px solid var(--paper3);border-radius:var(--r3);box-shadow:var(--sh-lg);padding:40px 36px;width:100%;max-width:360px}
.logo{display:flex;align-items:baseline;gap:1px;font-family:'Fraunces',serif;font-style:italic;font-size:22px;letter-spacing:-.3px;margin-bottom:28px;color:var(--ink);text-decoration:none}
.logo-f{font-size:26px;font-weight:400}
.logo-rest{font-weight:300;color:var(--ink2)}
.subtitle{font-size:12px;color:var(--ink4);margin-bottom:24px;margin-top:-20px}
form{display:flex;flex-direction:column;gap:16px}
label{font-size:12px;font-weight:500;color:var(--ink2);margin-bottom:4px;display:block}
input[type="email"],input[type="password"]{display:block;width:100%;padding:9px 12px;font-family:var(--sans);font-size:14px;color:var(--ink);background:var(--paper);border:1.5px solid var(--paper3);border-radius:var(--r2);outline:none;transition:border-color 0.15s}
input[type="email"]:focus,input[type="password"]:focus{border-color:var(--blue);background:#fff}
button[type="submit"]{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:10px 16px;margin-top:4px;font-family:var(--sans);font-size:14px;font-weight:500;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);cursor:pointer;transition:opacity 0.15s}
button[type="submit"]:hover{opacity:0.88}
.error-msg{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--r);background:var(--redbg);border:1px solid var(--redb);color:var(--red);font-size:13px;font-weight:500}
.hint{font-size:11px;color:var(--ink4);margin-top:-8px}
.page-link{margin-top:20px;text-align:center;font-size:12px;color:var(--ink4)}
.page-link a{color:var(--blue);text-decoration:none;font-weight:500}
.page-link a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/"><span class="logo-f">F</span><span class="logo-rest">akturant</span></a>
  <p class="subtitle">Vytvořte si nový účet</p>

  {% if error %}
  <div class="error-msg">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/auth/signup" autocomplete="on">
    <div>
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" autofocus
             placeholder="vas@email.cz" autocomplete="email"/>
    </div>
    <div>
      <label for="password">Heslo</label>
      <input type="password" id="password" name="password"
             placeholder="Minimálně 8 znaků" autocomplete="new-password"/>
      <p class="hint">Alespoň 8 znaků</p>
    </div>
    <div>
      <label for="confirm">Potvrdit heslo</label>
      <input type="password" id="confirm" name="confirm"
             placeholder="Zopakujte heslo" autocomplete="new-password"/>
    </div>
    <button type="submit">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
      Vytvořit účet
    </button>
  </form>

  <p class="page-link">Máte účet? <a href="/login">Přihlaste se</a></p>
</div>
</body>
</html>
